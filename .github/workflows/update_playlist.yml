name: Update Filtered Pluto TV Playlist

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Allow manual runs

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run filter script
        run: python filter_playlist.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PlutoTV/my_channels.m3u8
          git diff --cached --quiet || git commit -m "Update filtered playlist $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
